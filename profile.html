    <!-- Edit Profile Modal -->

    <div id="toast" class="toast"></div>

    <script>
        class ProfileStorage {
            constructor() {
                this.storageKey = 'studyflixProfile';
                this.load();
            }

            load() {
                const saved = localStorage.getItem(this.storageKey);
                if (saved) {
                    this.data = JSON.parse(saved);
                } else {
                    this.data = {
                        name: 'John Doe',
                        email: 'johndoe@gmail.com',
                        branch: 'Computer Science',
                        dateJoined: '15 February 2026',
                        profilePicture: null,
                        streak: 0,
                        lastVisited: null,
                        videosWatched: []
                    };
                    this.save();
                }
                this.updateStreakDaily();
            }

            save() {
                localStorage.setItem(this.storageKey, JSON.stringify(this.data));
            }

            update(updates) {
                this.data = { ...this.data, ...updates };
                this.save();
            }

            getAll() {
                return this.data;
            }

            addVideoWatched(videoInfo) {
                const video = {
                    id: videoInfo.id || Date.now(),
                    title: videoInfo.title,
                    subject: videoInfo.subject,
                    watchedDate: new Date().toISOString(),
                    duration: videoInfo.duration || 0
                };
                
                if (!this.data.videosWatched) {
                    this.data.videosWatched = [];
                }
                
                this.data.videosWatched.push(video);
                this.save();
                return video;
            }

            getVideosWatchedBySubject(subject) {
                if (!this.data.videosWatched) return [];
                return this.data.videosWatched.filter(v => v.subject === subject);
            }

            getTotalVideosWatched() {
                return this.data.videosWatched ? this.data.videosWatched.length : 0;
            }

            getVideosWatchedToday() {
                if (!this.data.videosWatched) return [];
                const today = new Date().toDateString();
                return this.data.videosWatched.filter(v => 
                    new Date(v.watchedDate).toDateString() === today
                );
            }

            updateStreakDaily() {
                const today = new Date().toDateString();
                const lastVisited = this.data.lastVisited ? new Date(this.data.lastVisited).toDateString() : null;
                
                if (lastVisited !== today) {
                    const yesterday = new Date();
                    yesterday.setDate(yesterday.getDate() - 1);
                    const yesterdayStr = yesterday.toDateString();
                    
                    if (lastVisited === yesterdayStr) {
                        this.data.streak += 1;
                    } else if (lastVisited === null) {
                        this.data.streak = 1;
                    } else {
                        this.data.streak = 1;
                    }
                    
                    this.data.lastVisited = new Date().toISOString();
                    this.save();
                }
            }

            getStreak() {
                return this.data.streak || 0;
            }

            getHeatmapData() {
                if (!this.data.videosWatched) return {};
                
                const heatmapData = {};
                this.data.videosWatched.forEach(video => {
                    const date = new Date(video.watchedDate).toDateString();
                    heatmapData[date] = (heatmapData[date] || 0) + 1;
                });
                
                return heatmapData;
            }

            isActiveDayOnDate(dateString) {
                const heatmap = this.getHeatmapData();
                return heatmap[dateString] > 0;
            }
        }

        const profileStorage = new ProfileStorage();

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        const changePicBtn = document.getElementById('changePicBtn');
        const picInput = document.getElementById('picInput');
        const customProfilePic = document.getElementById('customProfilePic');
        const defaultProfilePic = document.getElementById('defaultProfilePic');

        changePicBtn.addEventListener('click', () => {
            picInput.click();
        });

        picInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    customProfilePic.src = event.target.result;
                    customProfilePic.style.display = 'block';
                    defaultProfilePic.style.display = 'none';
                    
                    localStorage.setItem('studyflixProfilePic', event.target.result);
                    profileStorage.update({ profilePicture: event.target.result });
                    showToast('✓ Profile picture updated!', 'success');
                };
                reader.readAsDataURL(file);
            }
        });

        function loadProfilePicture() {
            const savedPic = localStorage.getItem('studyflixProfilePic');
            if (savedPic) {
                customProfilePic.src = savedPic;
                customProfilePic.style.display = 'block';
                defaultProfilePic.style.display = 'none';
            }
        }

        function updateProfileDisplay() {
            const profile = profileStorage.getAll();
            document.getElementById('profileName').textContent = profile.name;
            document.getElementById('profileEmail').textContent = profile.email;
            document.getElementById('profileBranch').textContent = profile.branch;
            document.getElementById('dateJoined').textContent = profile.dateJoined;
            
            const streak = profileStorage.getStreak();
            document.querySelector('.streak').textContent = `🔥 ${streak}`;
            document.getElementById('streakText').textContent = `${streak} day${streak !== 1 ? 's' : ''} 🔥`;
        }

        const editModal = document.getElementById('editModal');
        const editProfileBtn = document.getElementById('editProfileBtn');
        const closeEditModal = document.getElementById('closeEditModal');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const editProfileForm = document.getElementById('editProfileForm');

        editProfileBtn.addEventListener('click', () => {
            const profile = profileStorage.getAll();
            document.getElementById('nameInput').value = profile.name;
            document.getElementById('emailInput').value = profile.email;
            document.getElementById('branchInput').value = profile.branch;
            editModal.classList.add('show');
        });

        closeEditModal.addEventListener('click', () => {
            editModal.classList.remove('show');
        });

        cancelEditBtn.addEventListener('click', () => {
            editModal.classList.remove('show');
        });

        editProfileForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const updatedProfile = {
                name: document.getElementById('nameInput').value,
                email: document.getElementById('emailInput').value,
                branch: document.getElementById('branchInput').value
            };

            profileStorage.update(updatedProfile);
            updateProfileDisplay();
            editModal.classList.remove('show');

        window.addEventListener('click', (e) => {

        const subjectModal = document.getElementById('subjectModal');
        const closeSubjectModal = document.getElementById('closeSubjectModal');

        document.querySelectorAll('.sub-item').forEach(item => {

                const showcaseData = {
                    DSA: {

                        lastAccessed: 'Today at 2:30 PM',
                        topicsCovered: ['Arrays', 'Linked Lists', 'Trees', 'Graphs'],
                        nextTopic: 'Dynamic Programming',
                        videosWatchedList: [
                            'Introduction to Arrays',

                            'Binary Search Trees',

                        timeSpent: 4.2,
                        lastAccessed: 'Yesterday at 3:15 PM',
                        topicsCovered: ['CPU Basics', 'Memory Hierarchy', 'I/O Systems'],
                        nextTopic: 'Pipelining',
                        videosWatchedList: [
                            'CPU Architecture Overview',
                            'Instruction Sets',
                            'Cache Memory Systems',
                            'Virtual Memory'
                        ]
                    },
                    TOC: {
                        progress: 80,
                        videosWatched: 15,
                        timeSpent: 6.8,
                        lastAccessed: 'Today at 1:00 PM',
                        topicsCovered: ['Finite Automata', 'Context-Free Grammar', 'Turing Machines'],
                        nextTopic: 'Computability',
                        videosWatchedList: [
                            'Finite Automata Theory',
                            'DFA vs NFA',
                            'Context-Free Grammars',
                            'Push Down Automata',
                            'Turing Machines Intro',
                            'Complexity Classes'
                        ]
                    },
                    ML: {
                        progress: 55,
                        videosWatched: 7,
                        timeSpent: 3.5,
                        lastAccessed: '2 days ago',
                        topicsCovered: ['Linear Regression', 'Logistic Regression', 'Neural Networks'],
                        nextTopic: 'CNNs',
                        videosWatchedList: [
                            'Linear Regression Basics',
                            'Gradient Descent',

                            'Neural Networks Intro'
                        ]
                    }
                };

                const data = showcaseData[subject];
                
                document.getElementById('subjectTitle').textContent = `${subject} - Details`;
                document.getElementById('subjectDetails').innerHTML = `
                    <p><strong>Progress:</strong> ${data.progress}%</p>
                    <p><strong>Videos Watched:</strong> ${data.videosWatched}</p>
                    <p><strong>Time Spent:</strong> ${data.timeSpent} hours</p>
                    <p><strong>Last Accessed:</strong> ${data.lastAccessed}</p>
                    <p><strong>Topics Covered:</strong> ${data.topicsCovered.join(', ')}</p>
                    <p><strong>Next Topic:</strong> ${data.nextTopic}</p>
                    <hr>
                    <p><strong>Videos Watched in ${subject}:</strong></p>
                    <ul>
                        ${data.videosWatchedList.map(video => `<li>${video}</li>`).join('')}
                    </ul>
                `;
                
                subjectModal.classList.add('show');
            });
        });

        closeSubjectModal.addEventListener('click', () => {
            subjectModal.classList.remove('show');
        });

        window.addEventListener('click', (e) => {
            if (e.target === subjectModal) {
                subjectModal.classList.remove('show');
            }
        });


var BLOCK_W = 6 * 12 + 5 * 4;
var BLOCK_GAP = 40;

const tooltip = document.getElementById('heatmapTooltip');

function buildBlock() {

    var block = document.createElement('div');
    block.className = 'month-block';

    const heatmapData = profileStorage.getHeatmapData();

    for (let i = 29; i >= 0; i--) {

        const day = document.createElement('div');
        day.className = 'day-box';

        const date = new Date();
        date.setDate(date.getDate() - i);

        const dateString = date.toDateString();
        const videoCount = heatmapData[dateString] || 0;

        if (videoCount > 0) {

            if (videoCount === 1) day.classList.add('active-1');
            else if (videoCount === 2) day.classList.add('active-2');
            else day.classList.add('active-3');

        }

        // Tooltip hover
        day.addEventListener('mouseenter', (e) => {

            const text =
                videoCount > 0
                ? `${videoCount} video${videoCount > 1 ? 's' : ''} watched`
                : 'No activity';

            tooltip.textContent = text;

            tooltip.style.left = e.pageX + 10 + "px";
            tooltip.style.top = e.pageY + 10 + "px";

            tooltip.style.opacity = "1";
        });

        day.addEventListener('mousemove', (e) => {

            tooltip.style.left = e.pageX + 10 + "px";
            tooltip.style.top = e.pageY + 10 + "px";

        });

        day.addEventListener('mouseleave', () => {

            tooltip.style.opacity = "0";

        });

        block.appendChild(day);
    }

    return block;
}

function renderHeatmap() {

    var container = document.getElementById('heatmap-container');
    var panel = document.querySelector('.glass-panel');

    var available = panel.clientWidth - 60;

    var maxBlocks = Math.floor((available + BLOCK_GAP) / (BLOCK_W + BLOCK_GAP));

    if (maxBlocks < 1) maxBlocks = 1;

    var current = container.children.length;

    if (maxBlocks > current) {

        for (var i = current; i < maxBlocks; i++) {
            container.appendChild(buildBlock());
        }

    }
    else if (maxBlocks < current) {

        while (container.children.length > maxBlocks) {
            container.removeChild(container.lastChild);
        }

    }

}

window.addEventListener('load', () => {

    renderHeatmap();

});

var resizeTimer;

window.addEventListener('resize', function() {

    clearTimeout(resizeTimer);

    resizeTimer = setTimeout(renderHeatmap, 60);

});

        function addDemoVideos() {
            if (localStorage.getItem('demosAdded')) return;
            
            const today = new Date();
            
            const demoVideos = [
                { title: 'Introduction to Arrays', subject: 'DSA', daysAgo: 0 },
                { title: 'Linked Lists Basics', subject: 'DSA', daysAgo: 0 },
                { title: 'CPU Architecture Overview', subject: 'CAO', daysAgo: 1 },
                { title: 'Binary Search Trees', subject: 'DSA', daysAgo: 2 },
                { title: 'Finite Automata Theory', subject: 'TOC', daysAgo: 3 },
                { title: 'Graph Traversal', subject: 'DSA', daysAgo: 3 },
                { title: 'Linear Regression Basics', subject: 'ML', daysAgo: 4 },
                { title: 'DFA vs NFA', subject: 'TOC', daysAgo: 5 },
                { title: 'Neural Networks Intro', subject: 'ML', daysAgo: 6 }
            ];
            
            demoVideos.forEach(video => {
                const date = new Date(today);
                date.setDate(date.getDate() - video.daysAgo);
                
                const videoData = {
                    id: 'demo_' + Date.now() + Math.random(),
                    title: video.title,
                    subject: video.subject,
                    watchedDate: date.toISOString(),
                    duration: 45
                };
                
                profileStorage.addVideoWatched(videoData);
            });
            
            localStorage.setItem('demosAdded', 'true');
            updateProfileDisplay();
            renderHeatmap();
            showToast('📊 Demo videos loaded for showcase!', 'success');
        }

        function logVideoWatched(videoTitle, subject) {
            profileStorage.addVideoWatched({
                title: videoTitle,
                subject: subject,
                duration: 45
            });
            
            updateProfileDisplay();
            renderHeatmap();
            
            showToast(`✓ ${videoTitle} added to ${subject}!`, 'success');
        }
    </script>
