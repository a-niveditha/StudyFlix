<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<link href="css/notes.css" rel="stylesheet">
</head>
<body>

<!-- TOP NAVBAR -->
<nav class="navbar">
    <div class="logo">
        <img src="assets/images/sf.png" alt="SF Logo" class="logo-img">
        <span>StudyFlix</span>
    </div>
    <ul class="nav-links">
        <li><a href="landingpage.html">Home</a></li>
        <li><a href="playlists.html">Playlists</a></li>
        <li class="active">Notes</li>
    </ul>
    <a href="profile.html"><div class="profile-icon">👤</div></a>
</nav>

<!-- MAIN -->
<main class="main">
  <div class="cards-row">

    <!-- Col 1: TO-DO LIST (no label shown) -->
    <div class="card-col">
      <div class="col-label">PINNED:</div>
      <article class="note-card">
        <div class="card-title">TO - DO LIST</div>
        <div class="card-divider"></div>
        <div class="todo-list" id="todo-list">
          <!-- Items will be added dynamically -->
        </div>
        <div class="add-todo">
          <input type="text" id="new-todo-input" placeholder="Add new to-do">
          <button id="add-todo-btn">Add</button>
        </div>
      </article>
    </div>

    <!-- Col 2: DSA — PINNED label visible here -->
    <div class="card-col">
      <div class="col-label">PINNED:</div>
      <article class="note-card">
        <div class="card-subject-title">DSA</div>
        <div class="card-subject-sub">MODULE 1</div>
        <div class="card-divider"></div>
        <div class="card-content" onclick="editNote('dsa')"></div>
      </article>
    </div>

    <!-- Col 3: CAO (no label shown) -->
    <div class="card-col">
      <div class="col-label">PINNED:</div>
      <article class="note-card">
      <article class="note-card">
        <div class="card-subject-title">CAO</div>
        <div class="card-subject-sub">MODULE 2</div>
        <div class="card-divider"></div>
        <div class="card-content" onclick="editNote('cao')"></div>
      </article>
    </div>

  </div>
</main>

<!-- Modal for editing notes -->
<div id="note-modal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Edit Note</h2>
    <textarea id="note-textarea" rows="10" cols="50"></textarea>
    <button id="save-note">Save</button>
    <button id="cancel-note">Cancel</button>
  </div>
</div>

<script src="js/notes.js"></script>
</body>
</html>
