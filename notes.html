<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<link href="css/notes.css" rel="stylesheet">
</head>
<body>

<!-- TOP NAVBAR -->
<nav class="navbar">
    <div class="logo">
        <img src="assets/images/sf.png" alt="SF Logo" class="logo-img">
        <span>StudyFlix</span>
    </div>
    <ul class="nav-links">
        <li><a href="landingpage.html">Home</a></li>
        <li><a href="playlists.html">Playlists</a></li>
        <li class="active">Notes</li>
    </ul>
    <a href="profile.html"><div class="profile-icon">👤</div></a>
</nav>

<!-- MAIN -->
<main class="main">
  <!-- Top controls row -->
  <div class="toolbar">
    <button id="todo-page-btn">Open To‑Do List</button>

    <div class="add-note">
      <input type="text" id="new-note-subject" placeholder="Subject name">
      <input type="text" id="new-note-module" placeholder="Module name">
      <button id="add-note-btn">Add note</button>
    </div>

    <div class="subject-filter">
      <select id="subject-filter">
        <option value="all">All subjects</option>
      </select>
    </div>
  </div>

  <!-- Notes section -->
  <div class="notes-rows">
    <section class="notes-section">
      <div class="section-title">Pinned</div>
      <div class="notes-grid" id="pinned-notes"></div>
    </section>

    <section class="notes-section">
      <div class="section-title">Other Notes</div>
      <div class="notes-grid" id="other-notes"></div>
    </section>
  </div>
</main>

<!-- Modal for editing notes -->
<div id="note-modal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Edit Note</h2>
    <textarea id="note-textarea" rows="10" cols="50"></textarea>
    <button id="save-note">Save</button>
    <button id="cancel-note">Cancel</button>
  </div>
</div>

<script src="js/notes.js"></script>
</body>
</html>
